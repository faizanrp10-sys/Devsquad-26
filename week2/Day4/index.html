<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <title>Tip Calculator App</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap" rel="stylesheet">

    <link href="./src/output.css" rel="stylesheet">
</head>

<body
    class="min-h-screen flex flex-col items-center justify-center font-sans bg-light-grayish-cyan text-dark-grayish-cyan">

    <header class="mb-14 mt-10 md:mt-0">
        <img src="./images/logo.svg" alt="Splitter Logo" class="mx-auto" />
    </header>

    <main
        class="bg-white rounded-t-3xl md:rounded-3xl shadow-lg p-6 md:p-8 w-full max-w-[920px] flex flex-col md:flex-row gap-8">

        <!-- Left Section: Inputs -->
        <section class="flex-1 w-full space-y-8">

            <!-- Bill Input -->
            <div>
                <div class="flex justify-between">
                    <label for="bill" class="text-dark-grayish-cyan text-sm mb-2 block">Bill</label>
                    <span id="bill-error" class="text-red-500 text-sm hidden">Can't be zero</span>
                </div>
                <div class="relative">
                    <img src="./images/icon-dollar.svg" alt="dollar" class="absolute left-4 top-1/2 -translate-y-1/2">
                    <input type="number" id="bill" placeholder="0"
                        class="w-full bg-very-light-grayish-cyan text-very-dark-cyan text-2xl text-right p-3 pl-10 rounded-lg outline-none cursor-pointer focus:ring-2 focus:ring-strong-cyan placeholder:text-grayish-cyan">
                </div>
            </div>

            <!-- Select Tip -->
            <div>
                <label class="text-dark-grayish-cyan text-sm mb-4 block">Select Tip %</label>
                <div class="grid grid-cols-2 lg:grid-cols-3 gap-3" id="tip-buttons">
                    <button data-tip="5"
                        class="tip-btn bg-very-dark-cyan text-white text-2xl py-2 rounded-lg hover:bg-light-grayish-cyan hover:text-very-dark-cyan transition-colors focus:bg-strong-cyan focus:text-very-dark-cyan outline-none">5%</button>
                    <button data-tip="10"
                        class="tip-btn bg-very-dark-cyan text-white text-2xl py-2 rounded-lg hover:bg-light-grayish-cyan hover:text-very-dark-cyan transition-colors focus:bg-strong-cyan focus:text-very-dark-cyan outline-none">10%</button>
                    <button data-tip="15"
                        class="tip-btn bg-very-dark-cyan text-white text-2xl py-2 rounded-lg hover:bg-light-grayish-cyan hover:text-very-dark-cyan transition-colors focus:bg-strong-cyan focus:text-very-dark-cyan outline-none">15%</button>
                    <button data-tip="25"
                        class="tip-btn bg-very-dark-cyan text-white text-2xl py-2 rounded-lg hover:bg-light-grayish-cyan hover:text-very-dark-cyan transition-colors focus:bg-strong-cyan focus:text-very-dark-cyan outline-none">25%</button>
                    <button data-tip="50"
                        class="tip-btn bg-very-dark-cyan text-white text-2xl py-2 rounded-lg hover:bg-light-grayish-cyan hover:text-very-dark-cyan transition-colors focus:bg-strong-cyan focus:text-very-dark-cyan outline-none">50%</button>
                    <input type="number" id="custom-tip" placeholder="Custom"
                        class="w-full bg-very-light-grayish-cyan text-very-dark-cyan text-center text-xl rounded-lg outline-none focus:ring-2 focus:ring-strong-cyan placeholder:text-dark-grayish-cyan py-2 cursor-pointer">
                </div>
            </div>

            <!-- Number of People Input -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label for="people" class="text-dark-grayish-cyan text-sm block">Number of People</label>
                    <span id="people-error" class="text-red-500 text-sm hidden">Can't be zero</span>
                </div>
                <div class="relative">
                    <img src="./images/icon-person.svg" alt="person" class="absolute left-4 top-1/2 -translate-y-1/2">
                    <input type="number" id="people" placeholder="0"
                        class="people-input w-full bg-very-light-grayish-cyan text-very-dark-cyan text-2xl text-right p-3 pl-10 rounded-lg outline-none cursor-pointer focus:ring-2 focus:ring-strong-cyan placeholder:text-grayish-cyan">
                </div>
            </div>

        </section>

        <!-- Right Section: Results -->
        <section class="flex-1 w-full bg-very-dark-cyan rounded-xl p-6 md:p-10 flex flex-col justify-between">

            <div class="space-y-8 md:space-y-10 mt-2">
                <!-- Tip Amount -->
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="text-white text-sm md:text-base">Tip Amount</h2>
                        <p class="text-grayish-cyan text-xs md:text-sm">/ person</p>
                    </div>
                    <div class="text-strong-cyan text-4xl md:text-5xl tracking-tight" id="tip-amount">$0.00</div>
                </div>

                <!-- Total -->
                <div class="flex justify-between items-center">
                    <div>
                        <h2 class="text-white text-sm md:text-base">Total</h2>
                        <p class="text-grayish-cyan text-xs md:text-sm">/ person</p>
                    </div>
                    <div class="text-strong-cyan text-4xl md:text-5xl tracking-tight" id="total-amount">$0.00</div>
                </div>
            </div>

            <!-- Reset Button -->
            <button id="reset-btn" disabled
                class="w-full bg-strong-cyan text-very-dark-cyan hover:bg-light-grayish-cyan disabled:bg-strong-cyan/20 disabled:text-very-dark-cyan/50 disabled:cursor-not-allowed transition-colors text-xl py-3 rounded-lg mt-8 md:mt-0 uppercase tracking-wider outline-none">
                Reset
            </button>

        </section>
    </main>

    <!-- Footer -->
    <div class="mt-8 text-center text-sm md:mb-0 mb-8 hidden">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
            class="text-strong-cyan hover:underline">Frontend Mentor</a>.
        Coded by <a href="#" class="text-strong-cyan hover:underline">Your Name Here</a>.
    </div>

    <script src="./script.js"></script>
</body>

</html>
