version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: comment-system-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - comment-network

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express-comment-system
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/
    networks:
      - comment-network
    depends_on:
      - mongodb

volumes:
  mongodb_data:
  mongodb_config:

networks:
  comment-network:
    driver: bridge
