openapi: 3.0.0
info:
  title: Task Manager API
  description: In-Memory CRUD API for managing tasks
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local server
tags:
  - name: Tasks
    description: Endpoints for managing tasks
  - name: Stats
    description: API statistics
paths:
  /api/tasks:
    get:
      summary: Get all tasks
      tags: [Tasks]
      parameters:
        - in: query
          name: title
          schema:
            type: string
          description: Filter tasks by title
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                success: true
                data:
                  - id: d290f1ee-6c54-4b01-90e6-d701748f0851
                    title: Learn Express
                    completed: false
                message: Tasks retrieved successfully
    post:
      summary: Create a new task
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                completed:
                  type: boolean
            example:
              title: Learn Express
              completed: false
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              example:
                success: true
                data:
                  id: d290f1ee-6c54-4b01-90e6-d701748f0851
                  title: Learn Express
                  completed: false
                message: Task created successfully
        '400':
          description: Validation error
  /api/tasks/{id}:
    get:
      summary: Get task by ID
      tags: [Tasks]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID of the task
      responses:
        '200':
          description: Successful response
        '404':
          description: Task not found
    put:
      summary: Update a task
      tags: [Tasks]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID of the task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                completed:
                  type: boolean
            example:
              title: Learn Expres (Updated)
              completed: true
      responses:
        '200':
          description: Task updated successfully
        '400':
          description: Validation error
        '404':
          description: Task not found
    delete:
      summary: Remove a task
      tags: [Tasks]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: ID of the task
      responses:
        '200':
          description: Task removed successfully
        '404':
          description: Task not found
  /api/stats:
    get:
      summary: Get total API stats
      tags: [Stats]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              example:
                success: true
                data:
                  total: 5
                  completed: 2
                  pending: 3
                message: Stats retrieved successfully
